<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificación Toast Personalizada</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <div class="contenedor-principal">
        <h3>Notificación Toast en HTML, CSS y JS</h3>
        <div class="botones-toast">
            <div class="fila-toast">
                <button type="button" class="boton-personalizado boton-exito">Enviar</button>
                <button type="button" class="boton-personalizado boton-error">Falló</button>
                <button type="button" class="boton-personalizado boton-info">Información</button>
                <button type="button" class="boton-personalizado boton-alerta">Advertencia</button>
            </div>
        </div>
    </div>
    <div class="capa-notificaciones" id="capa-notificaciones"></div>
    <script src="./script.js"></script>
</body>
</html>
