<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creador de Currículum</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <section class="constructor-cv">
        <div class="contenedor">
            <h1>Creador de Currículum</h1>
            <div class="contenedor_cv">
                <form class="camposEntrada">
                    <input type="text" name="nombre" placeholder="Tu Nombre" title="Ingresa tu nombre" />
                    <input type="text" name="titulo" placeholder="Título / Subencabezado" title="Ingresa un título" />
                    <textarea name="experiencia_laboral" placeholder="Experiencia Laboral" cols="40" rows="3" title="Ingresa tu experiencia laboral"></textarea>
                    <textarea name="detalles_academicos" placeholder="Detalles Académicos" cols="40" rows="3" title="Ingresa tus detalles académicos"></textarea>
                    <input type="text" placeholder="Objetivo" title="Ingresa tu objetivo" name="objetivo" />
                    <textarea name="habilidades" title="Ingresa tus habilidades" placeholder="Habilidades" cols="40" rows="3"></textarea>
                    <textarea name="proyectos" title="Ingresa tus proyectos" placeholder="Proyectos" cols="40" rows="3"></textarea>
                    <textarea name="logros" placeholder="Logros" cols="40" rows="3" title="Ingresa tus logros"></textarea>
                    <textarea name="contacto" placeholder="Información de Contacto" cols="40" rows="3" title="Ingresa tu contacto"></textarea>
                </form>
            </div>

    <div class="contenedor_salida"></div>

    <button onclick="alternarVisibilidad()" class="btn-generar">Generar / Editar</button>

    <script src="script.js"></script>
</body>
</html>
